        desc = "ফেসবুকের জন্য সেরা attitude status bangla কালেকশন। নিজেকে রয়্যাল পার্সোনালিটিতে রিপ্রেজেন্ট করুন।";
      } else if(category === 'love-caption-bf') {
        title = "Love Caption for BF Bangla - রোমান্টিক সুফি ও রোমান্টিক স্ট্যাটাস";
        desc = "প্রেমিক বা প্রেমিকার জন্য সেরা রোমান্টিক love caption for bf এবং রুমি ও ইভানের কিউট ভালোবাসার স্ট্যাটাস কালেকশন।";
      }

      titleTag.innerText = title;
      descTag.setAttribute('content', desc);
      
      const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + (category === 'all' ? '' : `?category=${category}`);
      window.history.pushState({path:newurl},'',newurl);
    }

    function renderQuotes(filteredQuotes) {
      const container = document.getElementById('quotesContainer');
      container.innerHTML = '';
      if (filteredQuotes.length === 0) {
        container.innerHTML = `<div class="text-center text-gray-400 py-16 text-lg">কোনো ক্যাপশন খুঁজে পাওয়া যায়নি 😔</div>`;
        return;
      }
      filteredQuotes.forEach(quote => {
        const card = document.createElement('div');
        card.className = 'quote-card bg-black/40 backdrop-blur-md border border-white/5 rounded-3xl p-6 relative overflow-hidden';
        const safeText = quote.text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        card.innerHTML = `
          <p class="text-[16px] leading-relaxed font-light text-gray-100 italic mb-4">"${quote.text}"</p>
          <div class="flex justify-between items-center relative z-10">
            <p class="text-purple-400 text-sm font-medium">✨ — ${quote.author}</p>
            <button onclick="copyQuote('${safeText}')" class="w-10 h-10 bg-white/5 hover:bg-purple-600/40 rounded-full flex items-center justify-center text-white/70 hover:text-white transition-all">
              <i class="fas fa-copy"></i>
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function filterCategory(cat) {
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('bg-purple-600', 'text-white');
        btn.classList.add('bg-white/5');
      });
      if(document.getElementById(`btn-${cat}`)) {
        document.getElementById(`btn-${cat}`).classList.add('bg-purple-600', 'text-white');
      }
      
      updateSEOMeta(cat);
      if (cat === 'all') renderQuotes(quotes);
      else renderQuotes(quotes.filter(q => q.category === cat));
    }

    function copyQuote(text) {
      navigator.clipboard.writeText(text).then(() => {
        lastCopiedText = text;
        showToast('✅ ক্লিপবোর্ডে কপি হয়েছে!');
        document.getElementById('sharePopup').classList.add('show');
      });
    }

    function closeSharePopup() {
      document.getElementById('sharePopup').classList.remove('show');
    }

    function shareToWhatsApp() {
      const textToShare = `"${lastCopiedText}"\n\n👉 রুমি, গালিব ও ইভানের এরকম আরও উক্তি পাবেন এখানে: ${siteUrl}`;
      const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(textToShare)}`;
      window.open(whatsappUrl, '_blank');
      closeSharePopup();
    }

    function randomQuote() {
      const random = quotes[Math.floor(Math.random() * quotes.length)];
      copyQuote(random.text);
      showToast(`🎲 র্যান্ডম ক্যাপশন কপি করা হয়েছে!`);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      const filtered = quotes.filter(q => q.text.toLowerCase().includes(term) || q.author.toLowerCase().includes(term));
      renderQuotes(filtered);
    });

    // --- ব্যাকগ্রাউন্ড লাভ অ্যানিমেশন (Canvas Engine) ---
    const canvas = document.getElementById('bgCanvas'); const ctx = canvas.getContext('2d');
    let particlesArray = []; const numberOfParticles = 30;
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    class HeartParticle {
      constructor() { this.reset(); this.y = Math.random() * canvas.height; }
      reset() {
        this.x = Math.random() * canvas.width; this.y = canvas.height + 20;
        this.size = Math.random() * 6 + 4; this.speedY = -(Math.random() * 0.6 + 0.3);
        this.speedX = Math.sin(Math.random() * 2) * 0.2; this.opacity = Math.random() * 0.4 + 0.1;
        this.hue = Math.random() > 0.5 ? 280 : 340;
      }
      update() { this.y += this.speedY; this.x += this.speedX; if (this.y < -20) this.reset(); }
      draw() {
        ctx.save(); ctx.globalAlpha = this.opacity; ctx.fillStyle = `hsl(${this.hue}, 70%, 60%)`;
        ctx.translate(this.x, this.y); ctx.beginPath(); ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, -this.size/3, -this.size, 0);
        ctx.bezierCurveTo(-this.size, this.size/2, -this.size/3, this.size, 0, this.size*1.3);
        ctx.bezierCurveTo(this.size/3, this.size, this.size, this.size/2, this.size, 0);
        ctx.bezierCurveTo(this.size, -this.size/3, this.size/2, -this.size/2, 0, 0);
        ctx.closePath(); ctx.fill(); ctx.restore();
      }
    }
    function initParticles() { for (let i = 0; i < numberOfParticles; i++) particlesArray.push(new HeartParticle()); }
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); }
      requestAnimationFrame(animateParticles);
    }

    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const catParam = urlParams.get('category');
      if (catParam && document.getElementById(`btn-${catParam}`)) {
        filterCategory(catParam);
      } else {
        filterCategory('all');
      }
      initParticles(); animateParticles();
    };
  </script>
</body>
</html>
