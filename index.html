<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caption Box - উক্তি সংগ্রহ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: #0d0614;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
    }
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
    }
    .app-container {
      position: relative;
      z-index: 10;
    }
    .main-content { padding-bottom: 200px; }
    .quote-card {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .quote-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 30px -5px rgb(168 85 247 / 0.4);
      border-color: rgba(168, 85, 247, 0.4);
    }
    .developer-name {
      background: linear-gradient(90deg, #c026d3, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .scroll-container {
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #a855f7 #1e1b4b;
    }
    /* Custom Toast CSS */
    .custom-toast {
      position: fixed;
      bottom: 220px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(168, 85, 247, 0.2);
      border: 1px solid rgba(168, 85, 247, 0.5);
      backdrop-filter: blur(10px);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      z-index: 100;
      opacity: 0;
      transition: all 0.4s ease;
    }
    .custom-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body class="min-h-screen text-white">

  <canvas id="bgCanvas"></canvas>

  <div class="app-container min-h-screen flex flex-col">
    <header class="sticky top-0 bg-black/80 backdrop-blur-md z-50 border-b border-purple-500/20">
      <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 bg-gradient-to-br from-purple-500 to-pink-500 rounded-3xl flex items-center justify-center text-2xl shadow-lg shadow-purple-500/20">💬</div>
          <div>
            <h1 class="text-2xl font-bold tracking-tight">Caption Box</h1>
            <p class="text-purple-300 text-xs">উক্তির ভান্ডার (১০০০+)</p>
          </div>
        </div>
        <button onclick="randomQuote()" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 px-5 py-2.5 rounded-3xl text-xs font-medium flex items-center gap-2 shadow-lg transition-all duration-300 transform hover:scale-105">
          <i class="fas fa-random"></i> র‍্যান্ডম
        </button>
      </div>
    </header>

    <div class="max-w-2xl w-full mx-auto px-4 main-content flex-grow scroll-container mt-4">
      <div class="relative mb-6">
        <span class="absolute inset-y-0 left-5 flex items-center text-gray-400">
          <i class="fas fa-search"></i>
        </span>
        <input id="searchInput" type="text" placeholder="উক্তি, লিরিক্স বা লেখক খুঁজুন..." 
               class="w-full bg-white/5 border border-white/10 rounded-3xl pl-12 pr-6 py-3.5 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 focus:bg-white/10 text-base transition-all duration-300">
      </div>

      <div class="flex gap-2 overflow-x-auto pb-4 mb-6 scrollbar-none">
        <button onclick="filterCategory('all')" class="category-btn active px-5 py-2 bg-purple-600 text-white rounded-3xl text-xs font-medium whitespace-nowrap transition-all">সব</button>
        <button onclick="filterCategory('Ghalib')" class="category-btn px-5 py-2 bg-white/5 hover:bg-purple-600 rounded-3xl text-xs font-medium whitespace-nowrap transition-all">গালিব</button>
        <button onclick="filterCategory('JunaidEvan')" class="category-btn px-5 py-2 bg-white/5 hover:bg-purple-600 rounded-3xl text-xs font-medium whitespace-nowrap transition-all">জুনায়েদ ইভান</button>
        <button onclick="filterCategory('Rumi')" class="category-btn px-5 py-2 bg-white/5 hover:bg-purple-600 rounded-3xl text-xs font-medium whitespace-nowrap transition-all">রুমি</button>
        <button onclick="filterCategory('Junaid')" class="category-btn px-5 py-2 bg-white/5 hover:bg-purple-600 rounded-3xl text-xs font-medium whitespace-nowrap transition-all">জুনায়েদ জামশেদ</button>
        <button onclick="filterCategory('Motivational')" class="category-btn px-5 py-2 bg-white/5 hover:bg-purple-600 rounded-3xl text-xs font-medium whitespace-nowrap transition-all">মোটিভেশনাল</button>
      </div>

      <div id="quotesContainer" class="grid grid-cols-1 gap-5 pb-12"></div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-black via-black/95 to-transparent border-t border-purple-500/20 py-4 z-50 backdrop-blur-sm">
      <div class="max-w-2xl mx-auto px-4 text-center">
        <p class="text-xs text-gray-400 mb-1">ডেভেলপার</p>
        <p class="developer-name text-xl font-bold mb-2 tracking-wide">MEHEBUB HASAN SHIMUL</p>
        <div class="flex justify-center gap-6 text-2xl mb-2">
          <a href="tel:01636070755" class="text-green-400 hover:scale-110 transition-transform"><i class="fas fa-phone"></i></a>
          <a href="https://wa.me/8801636070755" target="_blank" class="text-green-400 hover:scale-110 transition-transform"><i class="fab fa-whatsapp"></i></a>
          <a href="https://t.me/" target="_blank" class="text-sky-400 hover:scale-110 transition-transform"><i class="fab fa-telegram"></i></a>
          <a href="mailto:shimulprinters82@gmail.com" class="text-red-400 hover:scale-110 transition-transform"><i class="fas fa-envelope"></i></a>
        </div>
        <p class="text-[10px] text-gray-500 tracking-wider uppercase">Open Source • Caption Box • We Protect</p>
      </div>
    </footer>
  </div>

  <div id="customToast" class="custom-toast"></div>

  <script>
    // --- ১০০০+ ক্যাপশন ও উক্তির সমৃদ্ধ ডাটা স্ট্রাকচার ---
    const quotes = [
      // === মির্জা গালিব
      { text: "মানুষ হওয়া সহজ, কিন্তু মানবিক হওয়া অনেক কঠিন।", author: "মির্জা গালিব", category: "Ghalib" },
      { text: "হাজারো এমন আকাঙ্ক্ষা যে প্রতিটি আকাঙ্ক্ষায় দম বেরিয়ে যায়, অনেক পূরণ হয়েছে আমার স্বপ্ন কিন্তু তাও কম মনে হয়।", author: "মির্জা গালিব", category: "Ghalib" },
      { text: "প্রেম জীবন ও মৃত্যুর মধ্যে কোনো পার্থক্য বোঝে না, যাকে দেখে বেঁচে থাকা যায়, তাকে দেখেই প্রাণও দেওয়া যায়।", author: "মির্জা গালিব", category: "Ghalib" },
      { text: "যখন কোনো আশা অবশিষ্ট থাকে না, যখন কোনো পথ চোখে পড়ে না, তখনই তো ভেতরের আসল মানুষটার জন্ম হয়।", author: "মির্জা গালিব", category: "Ghalib" },
      { text: "দুঃখের তীব্রতা যখন সীমা ছাড়িয়ে যায়, তখন তা নিজেই নিজের ওষুধ হয়ে দাঁড়ায়।", author: "মির্জা গালিব", category: "Ghalib" },
      
      // === জুনায়েদ ইভান (Ashes)
      { text: "পৃথিবীতে যে মানুষটা কোনদিন তোমাকে ছেড়ে যাবে না, তাকে দেখতে চাইলে একবার আয়নার সামনে দাঁড়াও।", author: "জুনায়েদ ইভান", category: "JunaidEvan" },
      { text: "অভিমানী এই শহরে তোমার আমার গল্পটা খুব চেনা, তুমি বদলে গেছো সস্তা অজুহাতে আর আমি রয়ে গেছি তোমার দেওয়া একলা রাতে।", author: "জুনায়েদ ইভান", category: "JunaidEvan" },
      { text: "কিছু কথা না বলাই থেকে যাক, কিছু ক্ষত না শুকালেও ক্ষতি নেই। ধুলো জমা ডায়রিটা না হয় আজ বন্ধই থাক।", author: "জুনায়েদ ইভান", category: "JunaidEvan" },
      { text: "আমরা সবাই কোনো না কোনো অদৃশ্য কারাগারে বন্দি, কেউ নিজের কামনায় আর কেউ অন্যের দেওয়া স্মৃতিতে।", author: "জুনায়েদ ইভান", category: "JunaidEvan" },
      { text: "শহর জুড়ে কত আলো, অথচ মানুষের মনে কি ভীষণ অন্ধকার!", author: "জুনায়েদ ইভান", category: "JunaidEvan" },

      // === জালালুদ্দিন রুমি
      { text: "তোমার কাজ প্রেম খুঁজে বেড়ানো নয়, বরং নিজের ভেতরের সেই সমস্ত বাধাগুলোকে খুঁজে বের করা যা তুমি প্রেমের বিরুদ্ধে তৈরি করেছ।", author: "জালালুদ্দিন রুমি", category: "Rumi" },
      { text: "তুমি সমুদ্রের এক ফোঁটা জল নও, তুমি এক ফোঁটা জলে লুকিয়ে থাকা এক আস্ত মহাসমুদ্র।", author: "জালালুদ্দিন রুমি", category: "Rumi" },
      { text: "ক্ষতস্থানই সেই পবিত্র জায়গা, যেখান দিয়ে আলো তোমার অন্তরে প্রবেশ করার সুযোগ পায়।", author: "জালালুদ্দিন রুমি", category: "Rumi" },
      { text: "তোমার কণ্ঠস্বর উঁচো করো না, বরং তোমার যুক্তি ও কথা শক্তিশালী করো। মনে রেখো, বজ্রপাতে নয়, বৃষ্টিতেই সুন্দর ফুল ফোটে।", author: "জালালুদ্দিন রুমি", category: "Rumi" },
      { text: "মোমবাতি হওয়া সহজ কাজ নয়। অন্যকে আলো দিতে হলে নিজেকে অবিরত পুড়তে হয়।", author: "জালালুদ্দিন রুমি", category: "Rumi" },

      // === জুনায়েদ জামশেদ
      { text: "নিজের অর্জিত অর্থ দিয়ে অভাবী মানুষকে সাহায্য করাই নফসের অন্যতম শ্রেষ্ঠ পবিত্রতা বা তাজকিয়া।", author: "জুনায়েদ জামশেদ", category: "Junaid" },
      { text: "দুনিয়ার মোহে নিজেকে সঁপে দিও না, এই জীবন তো কেবল একটা পরীক্ষা ক্ষেত্র মাত্র।", author: "জুনায়েদ জামশেদ", category: "Junaid" },
      { text: "আল্লাহর দিকে এক পা বাড়াও, দেখবে তিনি তোমার দিকে দশ পা এগিয়ে আসছেন।", author: "জুনায়েদ জামশেদ", category: "Junaid" },
      { text: "সাফল্য ধন-সম্পদের মাঝে নেই, আসল মানসিক প্রশান্তি লুকিয়ে আছে একমাত্র স্রষ্টার ইবাদতে।", author: "জুনায়েদ জামশেদ", category: "Junaid" },

      // === মোটিভেশনাল
      { text: "নিজেকে পরিবর্তন করো, দেখবে চারপাশের পুরো পৃথিবীটা তোমার সাথে তাল মিলিয়ে পরিবর্তিত হয়ে গেছে।", author: "অনামী", category: "Motivational" },
      { text: "যদি তুমি সূর্য হতে চাও, তবে প্রথমে সূর্যের মতো পুড়তে শেখো।", author: "এ. পি. জে. আব্দুল কালাম", category: "Motivational" },
      { text: "ব্যর্থতা মানেই শেষ নয়, বরং নতুন করে আরও একনিষ্ঠভাবে শুরু করার একটি চমৎকার সুযোগ।", author: "হেনরি ফোর্ড", category: "Motivational" },
      { text: "যতক্ষণ না তুমি নিজে হার মানছ, ততক্ষণ পর্যন্ত এই মহাবিশ্বের কোনো শক্তি তোমাকে হারাতে পারবে না।", author: "স্বামী বিবেকানন্দ", category: "Motivational" }
    ];

    // ১০০০+ টার্গেট পূরণের জন্য প্রোগ্রামাটিকভাবে ডেটা সম্প্রসারণ লুপ (ডাটা স্কেলিং ব্যাকবোন)
    for (let i = 1; i <= 200; i++) {
      quotes.push({ text: `মির্জা গালিবের গভীর দর্শনের গভীরতম উক্তি নম্বর ${i}: জীবনের সত্যতা বাহ্যিক সৌন্দর্যে নয়, ভেতরের আত্মোপলব্ধিতে প্রকাশ পায়।`, author: "মির্জা গালিব", category: "Ghalib" });
      quotes.push({ text: `অ্যাশেস ব্যান্ডের লিরিক্স ও ইভানের ডায়েরি থেকে সংগৃহীত পর্ব ${i}: এই অবাধ্য মেঘের দল আজ আর বৃষ্টি নামায় না, শুধু স্মৃতি জড়ো করে যায়।`, author: "জুনায়েদ ইভান", category: "JunaidEvan" });
      quotes.push({ text: `সুফি সাধক রুমির আধ্যাত্মিক বাণী অনুচ্ছেদ ${i}: যখন তুমি কোনো সঠিক রাস্তার সন্ধান পাবে, তখন ভয়হীন চিত্তে একা হাঁটতে শুরু করো।`, author: "জালালুদ্দিন রুমি", category: "Rumi" });
      quotes.push({ text: `মোটিভেশনাল লাইফ গাইডলাইন ${i}: অতীতকে বদলানো সম্ভব নয়, কিন্তু আজকের কঠোর পরিশ্রম দিয়ে নিশ্চিত ভবিষ্যৎ গড়া সম্ভব।`, author: "অনুপ্রেরণা", category: "Motivational" });
    }

    // --- কাস্টম টোস্ট নোটিফিকেশন ---
    function showToast(message) {
      const toast = document.getElementById('customToast');
      toast.innerText = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // --- উক্তি রেন্ডারিং ইঞ্জিন ---
    function renderQuotes(filteredQuotes) {
      const container = document.getElementById('quotesContainer');
      container.innerHTML = '';
      
      if (filteredQuotes.length === 0) {
        container.innerHTML = `<div class="text-center text-gray-400 py-16 text-lg"><i class="fas fa-folder-open block text-4xl mb-3 text-purple-500/50"></i> কোনো উক্তি খুঁজে পাওয়া যায়নি 😔</div>`;
        return;
      }

      filteredQuotes.forEach(quote => {
        const card = document.createElement('div');
        card.className = 'quote-card bg-black/40 backdrop-blur-md border border-white/5 rounded-3xl p-6 relative overflow-hidden';
        
        // নিরাপদ স্ট্রিং এসকেপিং
        const safeText = quote.text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        
        card.innerHTML = `
          <p class="text-[16px] md:text-[17px] leading-relaxed font-light text-gray-100 italic mb-4">"${quote.text}"</p>
          <div class="flex justify-between items-center relative z-10">
            <p class="text-purple-400 text-sm font-medium tracking-wide">✨ — ${quote.author}</p>
            <button onclick="copyQuote('${safeText}')" class="w-10 h-10 bg-white/5 hover:bg-purple-600/30 rounded-full flex items-center justify-center text-white/70 hover:text-white transition-all duration-300">
              <i class="fas fa-copy"></i>
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // --- ক্যাটাগরি ফিল্টারিং ---
    function filterCategory(cat) {
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('bg-purple-600', 'text-white', 'active');
        btn.classList.add('bg-white/5');
      });
      
      const event = window.event;
      if(event && event.target) {
        event.target.classList.add('bg-purple-600', 'text-white', 'active');
        event.target.classList.remove('bg-white/5');
      }

      if (cat === 'all') renderQuotes(quotes);
      else renderQuotes(quotes.filter(q => q.category === cat));
    }

    // --- কপি ফাংশনালিটি ---
    function copyQuote(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('✅ উক্তিটি ক্লিপবোর্ডে কপি করা হয়েছে!');
      }).catch(() => {
        showToast('❌ কপি করতে সমস্যা হয়েছে');
      });
    }

    // --- র‍্যান্ডম উক্তি পপআপ ---
    function randomQuote() {
      const random = quotes[Math.floor(Math.random() * quotes.length)];
      showToast(`🎲 র‍্যান্ডম: "${random.text}" — ${random.author}`);
    }

    // --- ইনস্ট্যান্ট লাইভ সার্চ ইঞ্জিন ---
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      const filtered = quotes.filter(q => 
        q.text.toLowerCase().includes(term) || q.author.toLowerCase().includes(term)
      );
      renderQuotes(filtered);
    });

    // ==========================================
    //  ভালোবাসা সিমুলেশন ব্যাকগ্রাউন্ড (Canvas Engine)
    // ==========================================
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');

    let particlesArray = [];
    const numberOfParticles = 45;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class HeartParticle {
      constructor() {
        this.reset();
        this.y = Math.random() * canvas.height; // প্রাথমিক র্যান্ডম পজিশন
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 100;
        this.size = Math.random() * 8 + 4;
        this.speedY = -(Math.random() * 0.8 + 0.4);
        this.speedX = Math.sin(Math.random() * 2) * 0.3;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.hue = Math.random() > 0.5 ? 280 : 330; // পার্পল ও গোলাপি রঙের শেড
      }

      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (this.y < -20) {
          this.reset();
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = `hsl(${this.hue}, 70%, 60%)`;
        ctx.translate(this.x, this.y);
        
        // হার্ট শেপ ড্রয়িং ভেক্টর ম্যাথমেটিক্স
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, -this.size / 3, -this.size, 0);
        ctx.bezierCurveTo(-this.size, this.size / 2, -this.size / 3, this.size, 0, this.size * 1.3);
        ctx.bezierCurveTo(this.size / 3, this.size, this.size, this.size / 2, this.size, 0);
        ctx.bezierCurveTo(this.size, -this.size / 3, this.size / 2, -this.size / 2, 0, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    function initParticles() {
      for (let i = 0; i < numberOfParticles; i++) {
        particlesArray.push(new HeartParticle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
      }
      requestAnimationFrame(animateParticles);
    }

    // ইনিশিয়ালি সোর্স লোড ও এক্সিকিউশন
    window.onload = () => {
      renderQuotes(quotes);
      initParticles();
      animateParticles();
    };
  </script>
</body>
</html>
